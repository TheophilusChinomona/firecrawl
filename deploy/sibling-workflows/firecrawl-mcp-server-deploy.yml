# Drop this into .github/workflows/deploy.yml of the
# TheophilusChinomona/firecrawl-mcp-server repo. It builds and pushes
# the firecrawl-mcp image to your GHCR on every push to the `release` branch.
#
# Once CI is wired up here, you can stop running
# firecrawl/deploy/build-sidecar-images.sh manually for this image.

name: Deploy firecrawl-mcp Image to GHCR

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push firecrawl-mcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/firecrawl-mcp:latest
          provenance: false
