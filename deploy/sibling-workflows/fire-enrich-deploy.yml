# Drop this into .github/workflows/deploy.yml of the
# TheophilusChinomona/fire-enrich repo. It builds and pushes
# both fire-enrich-web and cf-access-verifier images to your GHCR
# on every push to the `release` branch.
#
# Once CI is wired up here, you can stop running
# firecrawl/deploy/build-sidecar-images.sh manually for these two images.

name: Deploy fire-enrich Images to GHCR

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  fire-enrich-web:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push fire-enrich-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/fire-enrich-web:latest
          provenance: false

  cf-access-verifier:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push cf-access-verifier
        uses: docker/build-push-action@v6
        with:
          context: ./services/cf-access-verifier
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/cf-access-verifier:latest
          provenance: false
