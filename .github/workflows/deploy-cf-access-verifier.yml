name: Deploy cf-access-verifier Image to GHCR

on:
  push:
    branches:
      - release
    paths:
      - fire-enrich/services/cf-access-verifier/**
      - .github/workflows/deploy-cf-access-verifier.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./fire-enrich/services/cf-access-verifier
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/cf-access-verifier:latest
          provenance: false
