name: Deploy firecrawl-mcp Image to GHCR

# This image's Dockerfile.deploy COPYs from both firecrawl-mcp-server/
# and fire-enrich/packages/{db,core}/, so the build context is the repo
# root and the path filter watches both subtrees.

on:
  push:
    branches:
      - release
    paths:
      - firecrawl-mcp-server/**
      - fire-enrich/packages/db/**
      - fire-enrich/packages/core/**
      - .github/workflows/deploy-firecrawl-mcp.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./firecrawl-mcp-server/Dockerfile.deploy
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/firecrawl-mcp:latest
          provenance: false
