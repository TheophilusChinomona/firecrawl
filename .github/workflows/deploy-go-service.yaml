name: Deploy Go Service to GHCR

on:
  push:
    branches:
      - main
    paths:
      - apps/go-html-to-md-service/**
      - .github/workflows/deploy-go-service.yaml
  workflow_dispatch:

jobs:
  push-app-image:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: "./apps/go-html-to-md-service"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/go-html-to-md-service
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/go-html-to-md-service:latest
          provenance: false
