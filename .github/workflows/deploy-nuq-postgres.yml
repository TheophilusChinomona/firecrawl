name: Deploy NuQ Postgres to GHCR

on:
  push:
    branches:
      - main
    paths:
      - apps/nuq-postgres/**
  workflow_dispatch:

jobs:
  push-app-image:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: './apps/nuq-postgres'
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v5

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: 'Build NuQ Postgres Image'
        run: |
          docker build . --tag ghcr.io/${{ env.REPO_OWNER }}/nuq-postgres:latest
          docker push ghcr.io/${{ env.REPO_OWNER }}/nuq-postgres:latest
