x-common-service: &a1
  build:
    context: ./apps/api
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  networks:
    - backend
  extra_hosts:
    - host.docker.internal:host-gateway
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"
      compress: "true"
  restart: unless-stopped
x-common-env: &a2
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  REDIS_RATE_LIMIT_URL: ${REDIS_URL:-redis://redis:6379}
  PLAYWRIGHT_MICROSERVICE_URL: ${PLAYWRIGHT_MICROSERVICE_URL:-http://playwright-service:3000/scrape}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_HOST: ${POSTGRES_HOST:-nuq-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  USE_DB_AUTHENTICATION: ${USE_DB_AUTHENTICATION:-false}
  NUM_WORKERS_PER_QUEUE: ${NUM_WORKERS_PER_QUEUE:-4}
  CRAWL_CONCURRENT_REQUESTS: ${CRAWL_CONCURRENT_REQUESTS:-5}
  MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-3}
  BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-3}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL}
  MODEL_NAME: ${MODEL_NAME}
  MODEL_EMBEDDING_NAME: ${MODEL_EMBEDDING_NAME}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
  BULL_AUTH_KEY: ${BULL_AUTH_KEY}
  TEST_API_KEY: ${TEST_API_KEY}
  SELF_HOSTED_WEBHOOK_URL: ${SELF_HOSTED_WEBHOOK_URL}
  LOGGING_LEVEL: ${LOGGING_LEVEL:-info}
  SEARXNG_ENDPOINT: ${SEARXNG_ENDPOINT}
  SEARXNG_ENGINES: ${SEARXNG_ENGINES}
  SEARXNG_CATEGORIES: ${SEARXNG_CATEGORIES}
services:
  api:
    <<: *a1
    environment:
      <<: *a2
      HOST: 0.0.0.0
      PORT: ${INTERNAL_PORT:-3002}
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
      NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
      ENV: local
    depends_on:
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nuq-postgres:
        condition: service_healthy
    ports:
      - ${PORT:-3002}:${INTERNAL_PORT:-3002}
    command: node dist/src/harness.js --start-docker
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://localhost:3002/v0/health/readiness',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    cpus: 2
    mem_limit: 2G
    memswap_limit: 2G
    labels:
      - traefik.http.routers.firecrawl-core-gse2st-23-web.rule=Host(`crawl.theochinomona.tech`)
      - traefik.http.routers.firecrawl-core-gse2st-23-web.entrypoints=web
      - traefik.http.services.firecrawl-core-gse2st-23-web.loadbalancer.server.port=3002
      - traefik.http.routers.firecrawl-core-gse2st-23-web.service=firecrawl-core-gse2st-23-web
      - traefik.http.routers.firecrawl-core-gse2st-23-web.rule=Host(`crawl.theochinomona.tech`)
      - traefik.http.routers.firecrawl-core-gse2st-23-web.entrypoints=web
      - traefik.http.services.firecrawl-core-gse2st-23-web.loadbalancer.server.port=3002
      - traefik.http.routers.firecrawl-core-gse2st-23-web.service=firecrawl-core-gse2st-23-web
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.firecrawl-core-gse2st-23-web.rule=Host(`crawl.theochinomona.tech`)
      - traefik.http.routers.firecrawl-core-gse2st-23-web.entrypoints=web
      - traefik.http.services.firecrawl-core-gse2st-23-web.loadbalancer.server.port=3002
      - traefik.http.routers.firecrawl-core-gse2st-23-web.service=firecrawl-core-gse2st-23-web
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
      - backend
  playwright-service:
    build:
      context: ./apps/playwright-service-ts
    environment:
      PORT: 3000
      PROXY_SERVER: ${PROXY_SERVER}
      PROXY_USERNAME: ${PROXY_USERNAME}
      PROXY_PASSWORD: ${PROXY_PASSWORD}
      BLOCK_MEDIA: ${BLOCK_MEDIA:-true}
      MAX_CONCURRENT_PAGES: ${CRAWL_CONCURRENT_REQUESTS:-5}
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    cpus: 1
    mem_limit: 2G
    memswap_limit: 2G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        compress: "true"
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=512m
  redis:
    image: redis:alpine
    networks:
      - backend
    command: redis-server --bind 0.0.0.0 --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "2"
        compress: "true"
  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - backend
    environment:
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK_ABSOLUTE: 350MB
    command: rabbitmq-server
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - check_running
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "2"
        compress: "true"
  nuq-postgres:
    build:
      context: ./apps/nuq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        compress: "true"
volumes:
  pgdata:
    driver: local
networks:
  backend:
    driver: bridge
  dokploy-network:
    external: true
