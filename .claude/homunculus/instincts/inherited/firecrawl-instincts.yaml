# Firecrawl Workflow Full Feature Revert Workflow

## Action

Follow the full-feature-revert-workflow workflow:
1. Implement a large feature, often touching many files across controllers, tests, docs, and generated files.
2. Commit the changes.
3. Immediately create a revert commit that touches the exact same set of files, restoring them to their previous state.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: .kilo/plans/*.md, MIGRATION.md, README.md

